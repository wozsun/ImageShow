services:
  postgresql:
    image: postgres:18
    container_name: imageshow-postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgresql18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: imageshow-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  imageshow:
    build:
      context: .
    image: imageshow:latest
    container_name: imageshow
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      POSTGRES_HOST: postgresql
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DOMAIN: ${APP_DOMAIN:-example.com}
    ports:
      - "${HOST_PORT:-5518}:5518"
    volumes:
      - ./data/config:/app/config
      - ./data/storage:/app/storage
    init: true
    security_opt:
      - no-new-privileges:true

volumes:
  postgresql18_data:
  redis_data:
