services:
  postgresql:
    image: postgres:18
    container_name: imageshow-postgresql
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgresql18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: imageshow-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  imageshow:
    build:
      context: .
    image: imageshow:latest
    container_name: imageshow
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      TZ: ${TZ:-UTC}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DATABASE_HOST: postgresql
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      IMPORT_COMMIT_CONCURRENCY: ${IMPORT_COMMIT_CONCURRENCY:-5}
      IMPORT_GLOBAL_COMMIT_CONCURRENCY: ${IMPORT_GLOBAL_COMMIT_CONCURRENCY:-10}
    ports:
      - "${HOST_PORT:-5518}:5518"
    volumes:
      - ./data:/app/data
    init: true
    security_opt:
      - no-new-privileges:true

volumes:
  postgresql18_data:
  redis_data:
