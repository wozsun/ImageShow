name: Docker Release Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish release image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow only runs for v* tags, got: ${GITHUB_REF}" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v<major>.<minor>.<patch>, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          release_version="${GITHUB_REF_NAME#v}"
          for manifest in package.json packages/*/package.json; do
            manifest_version="$(node -p "require('./${manifest}').version")"
            if [[ "${manifest_version}" != "${release_version}" ]]; then
              echo "${manifest} version ${manifest_version} does not match release tag ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          done
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi
          docker_hub_name="${DOCKER_HUB_USERNAME}/imageshow"
          tcr_name="ccr.ccs.tencentyun.com/${TCR_NAMESPACE}/imageshow"
          {
            echo "tags<<EOF"
            echo "${docker_hub_name}:${GITHUB_REF_NAME}"
            echo "${tcr_name}:${GITHUB_REF_NAME}"
            echo "${docker_hub_name}:latest"
            echo "${tcr_name}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Authenticate to Tencent Container Registry
        uses: docker/login-action@v4
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and publish to both registries
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          release_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git log -1 --format=%B "${release_commit}" \
            | awk 'NR == 1 { next } NR == 2 && $0 == "" { next } { print }' \
            > "${notes_file}"
          if [[ ! -s "${notes_file}" ]]; then
            echo "${GITHUB_REF_NAME}" > "${notes_file}"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          fi
