name: Docker Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve and validate image tag
        id: image
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use v<major>.<minor>.<patch>, got: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            git fetch --no-tags origin main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
              exit 1
            fi
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported ref: ${GITHUB_REF}" >&2
            exit 1
          fi
          echo "docker_hub_name=${{ secrets.DOCKER_HUB_USERNAME }}/imageshow" >> "$GITHUB_OUTPUT"
          echo "tcr_name=ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/imageshow" >> "$GITHUB_OUTPUT"

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Authenticate to Tencent Container Registry
        uses: docker/login-action@v4
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and publish to both registries
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.docker_hub_name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.tcr_name }}:${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
