# 本文件定义 开发镜像构建流程。

name: Docker Dev Image

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: docker-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish dev image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
        run: |
          set -euo pipefail
          {
            echo "tags<<EOF"
            echo "${DOCKER_HUB_USERNAME}/imageshow:dev"
            echo "ccr.ccs.tencentyun.com/${TCR_NAMESPACE}/imageshow:dev"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Authenticate to Tencent Container Registry
        uses: docker/login-action@v4
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and publish to both registries
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
