name: Publish Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-release
  cancel-in-progress: false
  queue: max

jobs:
  publish:
    name: Publish release image
    runs-on: ubuntu-latest
    env:
      DOCKER_HUB_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/imageshow
      TCR_IMAGE: ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/imageshow
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow only runs for v* tags, got: ${GITHUB_REF}" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v<major>.<minor>.<patch>, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          release_version="${GITHUB_REF_NAME#v}"
          for manifest in package.json packages/*/package.json; do
            manifest_version="$(node -p "require('./${manifest}').version")"
            if [[ "${manifest_version}" != "${release_version}" ]]; then
              echo "${manifest} version ${manifest_version} does not match release tag ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          done
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v4
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Check for reusable dev image
        id: reusable_image
        shell: bash
        run: |
          set -euo pipefail
          revision_key="org.opencontainers.image.revision"

          inspect_manifest() {
            local image="$1"
            docker buildx imagetools inspect "${image}:dev" \
              --format '{{json .Manifest}}' 2>/dev/null
          }

          docker_hub_manifest="$(inspect_manifest "${DOCKER_HUB_IMAGE}" || true)"
          tcr_manifest="$(inspect_manifest "${TCR_IMAGE}" || true)"
          docker_hub_revision="$(jq -r --arg key "${revision_key}" \
            '.annotations[$key] // empty' <<< "${docker_hub_manifest}" 2>/dev/null || true)"
          tcr_revision="$(jq -r --arg key "${revision_key}" \
            '.annotations[$key] // empty' <<< "${tcr_manifest}" 2>/dev/null || true)"
          docker_hub_digest="$(jq -r '.digest // empty' \
            <<< "${docker_hub_manifest}" 2>/dev/null || true)"
          tcr_digest="$(jq -r '.digest // empty' \
            <<< "${tcr_manifest}" 2>/dev/null || true)"
          digest_pattern='^sha256:[0-9a-f]{64}$'

          if [[ "${docker_hub_revision}" == "${GITHUB_SHA}" \
            && "${tcr_revision}" == "${GITHUB_SHA}" \
            && "${docker_hub_digest}" =~ ${digest_pattern} \
            && "${tcr_digest}" =~ ${digest_pattern} ]]; then
            {
              echo "available=true"
              echo "docker_hub_digest=${docker_hub_digest}"
              echo "tcr_digest=${tcr_digest}"
            } >> "${GITHUB_OUTPUT}"
            echo "Reusing the current dev image from both registries."
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "The current dev image does not match ${GITHUB_SHA}; falling back to a full build."
            echo "Docker Hub revision: ${docker_hub_revision:-missing}"
            echo "Tencent registry revision: ${tcr_revision:-missing}"
          fi

      - name: Add release tags to current dev image
        if: steps.reusable_image.outputs.available == 'true'
        shell: bash
        env:
          DOCKER_HUB_DIGEST: ${{ steps.reusable_image.outputs.docker_hub_digest }}
          TCR_DIGEST: ${{ steps.reusable_image.outputs.tcr_digest }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
            --tag "${DOCKER_HUB_IMAGE}:${GITHUB_REF_NAME}" \
            --tag "${DOCKER_HUB_IMAGE}:latest" \
            "${DOCKER_HUB_IMAGE}@${DOCKER_HUB_DIGEST}"

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.revision=${GITHUB_SHA}" \
            --tag "${TCR_IMAGE}:${GITHUB_REF_NAME}" \
            --tag "${TCR_IMAGE}:latest" \
            "${TCR_IMAGE}@${TCR_DIGEST}"

      - name: Build and push release image
        if: steps.reusable_image.outputs.available != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_HUB_IMAGE }}:latest
            ${{ env.TCR_IMAGE }}:${{ github.ref_name }}
            ${{ env.TCR_IMAGE }}:latest
          annotations: |
            index:org.opencontainers.image.revision=${{ github.sha }}

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          git log -1 --format=%b > "${notes_file}"
          if ! grep -q '[^[:space:]]' "${notes_file}"; then
            echo "${GITHUB_REF_NAME}" > "${notes_file}"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          fi
