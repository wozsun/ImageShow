name: Publish Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push release image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow only runs for v* tags, got: ${GITHUB_REF}" >&2
            exit 1
          fi
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v<major>.<minor>.<patch>, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          release_version="${GITHUB_REF_NAME#v}"
          for manifest in package.json packages/*/package.json; do
            manifest_version="$(node -p "require('./${manifest}').version")"
            if [[ "${manifest_version}" != "${release_version}" ]]; then
              echo "${manifest} version ${manifest_version} does not match release tag ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          done
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v4
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push to both registries
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/imageshow:${{ github.ref_name }}
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/imageshow:${{ github.ref_name }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/imageshow:latest
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/imageshow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="${RUNNER_TEMP}/release-notes.md"
          git log -1 --format=%b > "${notes_file}"
          if ! grep -q '[^[:space:]]' "${notes_file}"; then
            echo "${GITHUB_REF_NAME}" > "${notes_file}"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${notes_file}"
          fi
